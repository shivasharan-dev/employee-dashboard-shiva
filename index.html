<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management Dashboard</title>
<link rel="stylesheet" href="css/emp_dashboard.css">
</head>
<body>
<header>
<h1>Employee Management Dashboard</h1>
<p>Manage employee records efficiently</p>
</header>
<section class="form-section">
<input type="text" id="name" placeholder="Employee Name">
<input type="text" id="role" placeholder="Role">
<input type="number" id="salary" placeholder="Salary">
<button onclick="addEmployee()">Add Employee</button>
</section>
<section class="search-section">
<input type="text" id="search" placeholder="Search Employee..." onkeyup="searchEmployee()">
</section>
<section>
<table id="employeeTable">
<thead>
<tr>
<th>Name</th>
<th>Role</th>
<th>Salary</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>
<script src="javascript/emp_dashboard.js"></script>
</body>
</html>
